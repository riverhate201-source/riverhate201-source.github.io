<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>피그마 실습 01</title>

    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <section class="main_product">
        <div class="title">
            <h2>봄은 마음에도 꽃을 피운다</h2>
            <p>두근거림이 피어나는 순간</p>
        </div>
        <div class="inner">
            <div class="itm">
                <div class="img_box">
                    <img src="./images/itm01.jpg" alt="vlrmak">
                </div>
                <div class="txt_box">
                    <strong>스쳐가는 바람에도</strong>
                    <p>봄은 소리 없이 마음을 흔든다</p>
                </div>
            </div>
            <div class="itm">
                <div class="img_box">
                    <img src="./images/itm02.jpg" alt="vlrmak">
                </div>
                <div class="txt_box">
                    <strong>따뜻함이 머무는 시간</strong>
                    <p>햇살 한 스푼, 바람 두 스푼의 계절</p>
                </div>
            </div>
            <div class="itm">
                <div class="img_box">
                    <img src="./images/itm03.jpg" alt="vlrmak">
                </div>
                <div class="txt_box">
                    <strong>결국, 봄은 온다</strong>
                    <p>꽃이 피는 건, 결국 견뎌낸 시간 덕분이다</p>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
